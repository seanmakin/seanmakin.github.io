<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sean Makin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,200;9..40,300;9..40,400&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0a0a0a;
      --surface:   #111111;
      --border:    #252525;
      --muted:     #444444;
      --text:      #c8c8c8;
      --text-dim:  #888888;
      --font:      'DM Sans', sans-serif;
      --ease:      cubic-bezier(0.25, 0.46, 0.45, 0.94);
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      min-height: 100vh;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='1'/%3E%3C/svg%3E");
      opacity: 0.025;
      pointer-events: none;
      z-index: 9999;
    }

    /* ── HEADER ── */
    header {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 200;
      padding: 26px 10%; 
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: linear-gradient(to bottom, rgba(10,10,10,0.97) 55%, transparent);
    }

    .logo {
      font-weight: 200; font-size: 1rem; letter-spacing: 0.28em; text-transform: uppercase;
    }
    .logo b { font-weight: 400; letter-spacing: 0.2em; }

    nav { display: flex; gap: 32px; align-items: center; }
    nav a {
      font-size: 0.8rem; font-weight: 300; letter-spacing: 0.18em;
      text-transform: uppercase; color: var(--text-dim);
      text-decoration: none; transition: color 0.25s;
    }
    nav a:hover { color: var(--text); }

    .nav-icon { display: flex; align-items: center; color: var(--text-dim); transition: color 0.25s; }
    .nav-icon:hover { color: var(--text); }

    /* ── GALLERY WRAPPER (80% Width) ── */
    #gallery-wrap { 
      padding: 120px 0 100px; 
      width: 80%;       
      margin: 0 auto;   
    }

    .gallery-meta { margin-bottom: 28px; }
    .gallery-label {
      font-size: 0.75rem; font-weight: 300; letter-spacing: 0.3em;
      text-transform: uppercase; color: var(--text-dim);
    }

    /* ── SIMPLE GRID ── */
    .grid { 
      display: grid;
      grid-template-columns: repeat(3, 1fr); 
      gap: 12px; 
    }

    .grid-item {
      position: relative;
      cursor: pointer;
      background: var(--surface);
      opacity: 0;
      transform: translateY(15px);
      transition: opacity 0.6s var(--ease), transform 0.6s var(--ease);
    }

    .grid-item.visible { opacity: 1; transform: translateY(0); }

    .grid-item img {
      display: block;
      width: 100%;
      height: auto; /* Reverted: Height is dictated by the image file */
      filter: brightness(0.9);
      transition: transform 0.6s var(--ease), filter 0.4s;
    }
    .grid-item:hover img { transform: scale(1.02); filter: brightness(1); }

    .grid-overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(to top, rgba(5,5,5,0.5) 0%, transparent 40%);
      opacity: 0;
      transition: opacity 0.3s;
      display: flex;
      align-items: flex-end;
      padding: 12px;
    }
    .grid-item:hover .grid-overlay { opacity: 1; }
    .grid-overlay span { font-size: 0.8rem; font-weight: 300; color: var(--text); }

    @media (max-width: 900px) { .grid { grid-template-columns: repeat(2, 1fr); } }
    @media (max-width: 550px) { 
      .grid { grid-template-columns: 1fr; }
      #gallery-wrap { width: 90%; }
      header { padding: 20px 5%; }
    }

    /* ── LIGHTBOX ── */
    .lightbox {
      position: fixed;
      inset: 0;
      z-index: 1000;
      background: rgba(5,5,5,0.98);
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s var(--ease);
    }
    .lightbox.open { opacity: 1; pointer-events: all; }

    .lb-inner {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
      width: 95%;
    }
    .lb-img {
      max-width: 100%;
      max-height: 85vh; 
      object-fit: contain;
      box-shadow: 0 30px 60px rgba(0,0,0,0.5);
    }

    .lb-caption { font-size: 0.9rem; font-weight: 300; letter-spacing: 0.1em; color: var(--text-dim); }
    .lb-counter { font-size: 0.7rem; letter-spacing: 0.2em; color: var(--text-dim); opacity: 0.6; }

    .lb-close {
      position: fixed; top: 25px; right: 30px;
      background: none; border: none; color: var(--text-dim);
      font-family: var(--font); font-size: 0.8rem; letter-spacing: 0.2em;
      text-transform: uppercase; cursor: pointer;
    }

    .lb-nav {
      position: fixed; top: 50%; transform: translateY(-50%);
      background: none; border: 1px solid var(--border);
      color: var(--text-dim); width: 40px; height: 40px;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
    }
    .lb-nav.prev { left: 20px; }
    .lb-nav.next { right: 20px; }

    /* ── FOOTER ── */
    footer { border-top: 1px solid var(--border); padding: 30px 0; width: 80%; margin: 0 auto; }
    .footer-text { font-size: 0.7rem; letter-spacing: 0.2em; color: var(--text-dim); text-transform: uppercase; }
  </style>
</head>
<body>

<header>
  <div class="logo">Sean <b>Makin</b></div>
  <nav>
    <a href="mailto:you@email.com">Contact</a>
    <a href="https://www.flickr.com/photos/makinphotography/" target="_blank" rel="noopener" class="nav-icon">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><circle cx="7" cy="12" r="4.5"/><circle cx="17" cy="12" r="4.5"/></svg>
    </a>
    <a href="https://www.instagram.com/sean.makin/" target="_blank" rel="noopener" class="nav-icon">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="2" width="20" height="20" rx="5"/><circle cx="12" cy="12" r="4"/><circle cx="17.5" cy="6.5" r="0.75" fill="currentColor" stroke="none"/></svg>
    </a>
  </nav>
</header>

<div id="gallery-wrap">
  <div class="gallery-meta"><span class="gallery-label">Portfolio</span></div>
  <div class="grid" id="grid"></div>
</div>

<footer>
  <span class="footer-text">© Sean Makin</span>
</footer>

<div class="lightbox" id="lightbox">
  <button class="lb-close" id="lb-close">✕ &nbsp;Close</button>
  <button class="lb-nav prev" id="lb-prev">&#8592;</button>
  <button class="lb-nav next" id="lb-next">&#8594;</button>
  <div class="lb-inner">
    <img class="lb-img" id="lb-img" src="" alt="" />
    <div class="lb-caption" id="lb-caption"></div>
    <div class="lb-counter" id="lb-counter"></div>
  </div>
</div>

<script>
  const PHOTOS = [
    { file: "DJI_0065-1 3000px.jpg", title: "Tendrils" },
    { file: "DSC_0365-HDR 3000px.jpg", title: "Spa" },
    { file: "DSC_0795-Edit 3000px.jpg", title: "Canal" },
    { file: "DSC_5583-Edit 3000px.jpg", title: "Withered" },
    { file: "DSC_6096-Edit 3000px.jpg", title: "Sticks" },
    { file: "DSC_6266-Pano-Edit 3000px.jpg", title: "Over The Hills" },
    { file: "DSC_6906-Edit 3000px.jpg", title: "Tall" },
    { file: "DSC_6978-Edit 3000px.jpg", title: "Kermits" },
    { file: "DSC_7135-Edit 3000px.jpg", title: "Sugarloaf" },
    { file: "DSC_7179-Edit 3000px.jpg", title: "Awakening" },
    { file: "DSC_7534-Pano-Edit 3000px.jpg", title: "All That Glitters Is Gold" },
    { file: "DSC_7940-Edit 3000px.jpg", title: "The Core" },
    { file: "DSC_9011-Edit 3000px.jpg", title: "Pressure" },
    { file: "DSC0264-Edit 3000px.jpg", title: "Precarious" },
    { file: "DSC8770-Pano 3000px.jpg", title: "Lonesome" },
    { file: "DSC9334-Edit 3000px.jpg", title: "Misty Mountains" }
  ];

  const IMAGE_DIR = "images/";
  const grid = document.getElementById('grid');

  PHOTOS.forEach(({ file, title }, i) => {
    const item = document.createElement('div');
    item.className = 'grid-item';
    
    // We still encode the URI to handle the spaces in your filenames
    const src = IMAGE_DIR + encodeURIComponent(file);

    item.innerHTML = `
      <img src="${src}" alt="${title}" loading="lazy" />
      <div class="grid-overlay"><span>${title}</span></div>`;

    item.addEventListener('click', () => openLightbox(i));
    grid.appendChild(item);

    // Staggered fade in
    setTimeout(() => {
      requestAnimationFrame(() => item.classList.add('visible'));
    }, (i % 3) * 80 + 50);
  });

  // Lightbox Logic
  let lbIndex = 0;
  const lightbox = document.getElementById('lightbox');
  const lbImg = document.getElementById('lb-img');
  const lbCaption = document.getElementById('lb-caption');
  const lbCounter = document.getElementById('lb-counter');

  function openLightbox(idx) {
    lbIndex = idx;
    showPhoto();
    lightbox.classList.add('open');
    document.body.style.overflow = 'hidden';
  }

  function closeLightbox() {
    lightbox.classList.remove('open');
    document.body.style.overflow = '';
  }

  function showPhoto() {
    const { file, title } = PHOTOS[lbIndex];
    lbImg.src = IMAGE_DIR + encodeURIComponent(file);
    lbCaption.textContent = title;
    lbCounter.textContent = `${lbIndex + 1} / ${PHOTOS.length}`;
  }

  document.getElementById('lb-close').addEventListener('click', closeLightbox);
  document.getElementById('lb-prev').addEventListener('click', () => { lbIndex = (lbIndex - 1 + PHOTOS.length) % PHOTOS.length; showPhoto(); });
  document.getElementById('lb-next').addEventListener('click', () => { lbIndex = (lbIndex + 1) % PHOTOS.length; showPhoto(); });
  lightbox.addEventListener('click', e => { if (e.target === lightbox) closeLightbox(); });

  // Keyboard support
  document.addEventListener('keydown', e => {
    if (!lightbox.classList.contains('open')) return;
    if (e.key === 'Escape') closeLightbox();
    if (e.key === 'ArrowLeft') { lbIndex = (lbIndex - 1 + PHOTOS.length) % PHOTOS.length; showPhoto(); }
    if (e.key === 'ArrowRight') { lbIndex = (lbIndex + 1) % PHOTOS.length; showPhoto(); }
  });
</script>
</body>
</html>
