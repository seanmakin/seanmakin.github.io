<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sean Makin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,200;9..40,300;9..40,400&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
 
    :root {
      --bg:       #0a0a0a;
      --surface:  #111111;
      --border:   #252525;
      --muted:    #444444;
      --text:     #c8c8c8;
      --text-dim: #888888;
      --accent:   #c8c8c8;
      --white:    #c8c8c8;
      --font:     'DM Sans', sans-serif;
      --ease:     cubic-bezier(0.25, 0.46, 0.45, 0.94);
    }
 
    html { scroll-behavior: smooth; }
 
    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      min-height: 100vh;
      overflow-x: hidden;
    }
 
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='1'/%3E%3C/svg%3E");
      opacity: 0.025;
      pointer-events: none;
      z-index: 9999;
    }
 
    /* ── HEADER ── */
    header {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 200;
      padding: 26px 44px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: linear-gradient(to bottom, rgba(10,10,10,0.97) 55%, transparent);
    }
 
    .logo {
      font-weight: 200;
      font-size: 1rem;
      letter-spacing: 0.28em;
      color: var(--text);
      text-transform: uppercase;
    }
    .logo b { font-weight: 400; color: var(--text); letter-spacing: 0.2em; }
 
    nav { display: flex; gap: 32px; align-items: center; }
    nav a {
      font-size: 0.8rem;
      font-weight: 300;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--text-dim);
      text-decoration: none;
      transition: color 0.25s;
    }
    nav a:hover { color: var(--text); }
 
    .nav-icon {
      display: flex;
      align-items: center;
      color: var(--text-dim);
      transition: color 0.25s;
    }
    .nav-icon:hover { color: var(--text); }
 
    /* ── GALLERY ── */
    #gallery-wrap { padding: 100px 44px 100px; }
 
    .gallery-meta {
      display: flex;
      align-items: center;
      gap: 20px;
      margin-bottom: 28px;
    }
    .gallery-label {
      font-size: 0.75rem;
      font-weight: 300;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--text-dim);
    }
    .gallery-count {
      font-size: 0.75rem;
      font-weight: 300;
      letter-spacing: 0.15em;
      color: var(--text-dim);
      opacity: 0.6;
    }
 
    /* masonry */
    .grid { columns: 3; column-gap: 4px; }
    @media (max-width: 860px) { .grid { columns: 2; } }
    @media (max-width: 500px) { .grid { columns: 1; } }
 
    .grid-item {
      break-inside: avoid;
      margin-bottom: 4px;
      position: relative;
      overflow: hidden;
      cursor: pointer;
      background: var(--surface);
      opacity: 0;
      transform: translateY(12px);
      transition: opacity 0.55s var(--ease), transform 0.55s var(--ease);
    }
    .grid-item.visible { opacity: 1; transform: translateY(0); }
 
    .grid-item img {
      display: block;
      width: 100%;
      height: auto;
      transition: transform 0.65s var(--ease), filter 0.35s;
      filter: brightness(0.88) saturate(0.88);
    }
    .grid-item:hover img { transform: scale(1.03); filter: brightness(1) saturate(1); }
 
    .grid-overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(to top, rgba(5,5,5,0.68) 0%, transparent 46%);
      opacity: 0;
      transition: opacity 0.3s;
      display: flex;
      align-items: flex-end;
      padding: 14px 16px;
    }
    .grid-item:hover .grid-overlay { opacity: 1; }
    .grid-overlay span {
      font-size: 0.85rem;
      font-weight: 300;
      letter-spacing: 0.05em;
      color: var(--text);
    }
 
    /* ── EMPTY STATE ── */
    #empty-state {
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      padding: 120px 40px;
      text-align: center;
    }
    #empty-state.show { display: flex; }
    .empty-icon { width: 36px; height: 36px; color: var(--muted); }
    .empty-title {
      font-size: 0.85rem;
      font-weight: 300;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      color: var(--text-dim);
    }
    .empty-sub {
      font-size: 0.78rem;
      font-weight: 300;
      letter-spacing: 0.06em;
      color: var(--text-dim);
      opacity: 0.7;
      max-width: 360px;
      line-height: 1.8;
    }
    .empty-sub code {
      font-family: 'Courier New', monospace;
      background: var(--surface);
      border: 1px solid var(--border);
      padding: 1px 6px;
      border-radius: 2px;
      color: var(--text);
      font-size: 0.9em;
    }
 
    /* ── LIGHTBOX ── */
    .lightbox {
      position: fixed;
      inset: 0;
      z-index: 1000;
      background: rgba(5,5,5,0.97);
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s var(--ease);
    }
    .lightbox.open { opacity: 1; pointer-events: all; }
 
    .lb-inner {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
      max-width: min(92vw, 1100px);
    }
    .lb-img {
      max-width: 100%;
      max-height: 82vh;
      object-fit: contain;
      display: block;
      box-shadow: 0 32px 80px rgba(0,0,0,0.7);
      transform: scale(0.97);
      transition: transform 0.35s var(--ease);
    }
    .lightbox.open .lb-img { transform: scale(1); }
 
    .lb-caption {
      font-size: 0.9rem;
      font-weight: 300;
      letter-spacing: 0.1em;
      color: var(--text-dim);
    }
    .lb-counter {
      font-size: 0.72rem;
      font-weight: 300;
      letter-spacing: 0.25em;
      color: var(--text-dim);
      opacity: 0.7;
    }
 
    .lb-close {
      position: fixed;
      top: 26px; right: 40px;
      background: none;
      border: none;
      color: var(--text-dim);
      font-family: var(--font);
      font-size: 0.78rem;
      font-weight: 300;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      cursor: pointer;
      transition: color 0.25s;
    }
    .lb-close:hover { color: var(--text); }
 
    .lb-nav {
      position: fixed;
      top: 50%; transform: translateY(-50%);
      background: none;
      border: 1px solid var(--muted);
      color: var(--text-dim);
      width: 44px; height: 44px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.1rem;
      font-family: var(--font);
      transition: border-color 0.25s, color 0.25s;
    }
    .lb-nav:hover { border-color: var(--text); color: var(--text); }
    .lb-nav.prev { left: 20px; }
    .lb-nav.next { right: 20px; }
 
    /* ── FOOTER ── */
    footer {
      border-top: 1px solid var(--border);
      padding: 30px 44px;
    }
    .footer-text {
      font-size: 0.72rem;
      font-weight: 300;
      letter-spacing: 0.28em;
      color: var(--text-dim);
      text-transform: uppercase;
    }
 
    ::-webkit-scrollbar { width: 3px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: var(--muted); }
    ::-webkit-scrollbar-thumb:hover { background: var(--accent); }
 
    @media (max-width: 580px) {
      header { padding: 20px 20px; }
      #gallery-wrap { padding: 88px 20px 80px; }
      footer { padding: 28px 20px; }
      .lb-nav.prev { left: 6px; }
      .lb-nav.next { right: 6px; }
    }
  </style>
</head>
<body>
 
<header>
  <div class="logo">Sean <b>Makin</b></div>
  <nav>
    <a href="mailto:you@email.com">Contact</a>
    <a href="https://www.flickr.com/photos/makinphotography/" target="_blank" rel="noopener" aria-label="Flickr" class="nav-icon">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor" xmlns="http://www.w3.org/2000/svg">
        <circle cx="7" cy="12" r="4.5"/>
        <circle cx="17" cy="12" r="4.5"/>
      </svg>
    </a>
    <a href="https://www.instagram.com/sean.makin/" target="_blank" rel="noopener" aria-label="Instagram" class="nav-icon">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" xmlns="http://www.w3.org/2000/svg">
        <rect x="2" y="2" width="20" height="20" rx="5"/>
        <circle cx="12" cy="12" r="4"/>
        <circle cx="17.5" cy="6.5" r="0.75" fill="currentColor" stroke="none"/>
      </svg>
    </a>
  </nav>
</header>
 
<div id="gallery-wrap">
  <div class="gallery-meta">
    <span class="gallery-label">Portfolio</span>
  </div>
  <div id="empty-state">
    <svg class="empty-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1" stroke-linecap="round" stroke-linejoin="round">
      <rect x="3" y="3" width="18" height="18" rx="1"/>
      <circle cx="8.5" cy="8.5" r="1.5"/>
      <polyline points="21 15 16 10 5 21"/>
    </svg>
    <p class="empty-title">No photos yet</p>
    <p class="empty-sub">Add your images to the <code>images/</code> folder in your repo, then list them in the <code>PHOTOS</code> array inside <code>index.html</code>.</p>
  </div>
  <div class="grid" id="grid"></div>
</div>
 
<footer>
  <span class="footer-text">© Sean Makin</span>
</footer>
 
<div class="lightbox" id="lightbox">
  <button class="lb-close" id="lb-close">✕ &nbsp;Close</button>
  <button class="lb-nav prev" id="lb-prev">&#8592;</button>
  <button class="lb-nav next" id="lb-next">&#8594;</button>
  <div class="lb-inner">
    <img class="lb-img" id="lb-img" src="" alt="" />
    <div class="lb-caption" id="lb-caption"></div>
    <div class="lb-counter" id="lb-counter"></div>
  </div>
</div>

<script>
  // ============================================================
  //  PHOTOS — add an entry for every image in your images/ folder
  //
  //  Each entry:
  //    file  : filename inside the images/ folder
  //    title : caption shown on hover and in the lightbox
  //            (leave as "" to show nothing)
  // ============================================================
  const PHOTOS = [
    { file: "DJI_0065-1 3000px.jpg", title: "Tendrils" },
    { file: "DSC_0365-HDR 3000px.jpg", title: "Spa" },
    { file: "DSC_0795-Edit 3000px.jpg", title: "Canal" },
    { file: "DSC_5583-Edit 3000px.jpg", title: "Withered" },
    { file: "DSC_6096-Edit 3000px.jpg", title: "Sticks" },
    { file: "DSC_6266-Pano-Edit 3000px.jpg", title: "Over The Hills" },
    { file: "DSC_6906-Edit 3000px.jpg", title: "Tall" },
    { file: "DSC_6978-Edit 3000px.jpg", title: "Kermits" },
    { file: "DSC_7135-Edit 3000px.jpg", title: "Sugarloaf" },
    { file: "DSC_7179-Edit 3000px.jpg", title: "Awakening" },
    { file: "DSC_7534-Pano-Edit 3000px.jpg", title: "All That Glitters Is Gold" },
    { file: "DSC_7940-Edit 3000px.jpg", title: "The Core" },
    { file: "DSC_9011-Edit 3000px.jpg", title: "Pressure" },
    { file: "_DSC0264-Edit 3000px.jpg", title: "Precarious" },
    { file: "_DSC8770-Pano 3000px.jpg", title: "Lonesome" },
    { file: "_DSC9334-Edit 3000px.jpg", title: "Misty Mountains" },
    // { file: "DSC_0003.jpg", title: "" },
    // { file: "DSC_0003.jpg", title: "" },
    // { file: "DSC_0003.jpg", title: "" },

    //
    // Add more lines above this comment.
    // Delete the // at the start of each line to activate it.
  ];
  // ============================================================

  const IMAGE_DIR = "images/"; // folder relative to index.html
 
  // ── BUILD GRID ──────────────────────────────────────────────
  const grid       = document.getElementById('grid');
  const emptyState = document.getElementById('empty-state');
 
  if (PHOTOS.length === 0) {
    emptyState.classList.add('show');
  } else {
 
    PHOTOS.forEach(({ file, title }, i) => {
      const src  = IMAGE_DIR + file;
      const item = document.createElement('div');
      item.className   = 'grid-item';
      item.dataset.idx = i;
 
      item.innerHTML = `
        <img src="${src}" alt="${title}" loading="lazy" />
        <div class="grid-overlay"><span>${title}</span></div>`;
 
      item.addEventListener('click', () => openLightbox(i));
      grid.appendChild(item);
 
      const delay = (i % 3) * 65;
      setTimeout(() => requestAnimationFrame(() => item.classList.add('visible')), delay + 20);
    });
 
    // IntersectionObserver for items below fold
    const observer = new IntersectionObserver(entries => {
      entries.forEach(entry => {
        if (entry.isIntersecting) {
          const i     = parseInt(entry.target.dataset.idx);
          const delay = (i % 3) * 65;
          setTimeout(() => entry.target.classList.add('visible'), delay);
          observer.unobserve(entry.target);
        }
      });
    }, { threshold: 0.06 });
 
    document.querySelectorAll('.grid-item').forEach(el => observer.observe(el));
  }
 
  // ── LIGHTBOX ────────────────────────────────────────────────
  let lbIndex = 0;
  const lightbox  = document.getElementById('lightbox');
  const lbImg     = document.getElementById('lb-img');
  const lbCaption = document.getElementById('lb-caption');
  const lbCounter = document.getElementById('lb-counter');
 
  function openLightbox(idx) {
    lbIndex = idx;
    showPhoto();
    lightbox.classList.add('open');
    document.body.style.overflow = 'hidden';
  }
 
  function closeLightbox() {
    lightbox.classList.remove('open');
    document.body.style.overflow = '';
  }
 
  function showPhoto() {
    const { file, title } = PHOTOS[lbIndex];
    lbImg.src             = IMAGE_DIR + file;
    lbImg.alt             = title;
    lbCaption.textContent = title;
    lbCounter.textContent = `${lbIndex + 1} / ${PHOTOS.length}`;
  }
 
  document.getElementById('lb-close').addEventListener('click', closeLightbox);
  document.getElementById('lb-prev').addEventListener('click', () => {
    lbIndex = (lbIndex - 1 + PHOTOS.length) % PHOTOS.length; showPhoto();
  });
  document.getElementById('lb-next').addEventListener('click', () => {
    lbIndex = (lbIndex + 1) % PHOTOS.length; showPhoto();
  });
  lightbox.addEventListener('click', e => { if (e.target === lightbox) closeLightbox(); });
  document.addEventListener('keydown', e => {
    if (!lightbox.classList.contains('open')) return;
    if (e.key === 'Escape')      closeLightbox();
    if (e.key === 'ArrowLeft')  { lbIndex = (lbIndex - 1 + PHOTOS.length) % PHOTOS.length; showPhoto(); }
    if (e.key === 'ArrowRight') { lbIndex = (lbIndex + 1) % PHOTOS.length; showPhoto(); }
  });
</script>
</body>
</html>
