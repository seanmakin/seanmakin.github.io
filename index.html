<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Makin Photography</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,200;9..40,300;9..40,400&display=swap" rel="stylesheet" />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #0a0a0a;
      --surface:  #111111;
      --border:   #1e1e1e;
      --muted:    #3a3a3a;
      --text:     #b8b0a8;
      --text-dim: #4a4642;
      --accent:   #c8a96e;
      --white:    #e8e2d9;
      --font:     'DM Sans', sans-serif;
      --ease:     cubic-bezier(0.25, 0.46, 0.45, 0.94);
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* noise grain */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='1'/%3E%3C/svg%3E");
      opacity: 0.025;
      pointer-events: none;
      z-index: 9999;
    }

    /* ── HEADER ── */
    header {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 200;
      padding: 26px 44px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: linear-gradient(to bottom, rgba(10,10,10,0.97) 55%, transparent);
    }

    .logo {
      font-weight: 200;
      font-size: 0.78rem;
      letter-spacing: 0.28em;
      color: var(--white);
      text-transform: uppercase;
    }

    .logo b {
      font-weight: 400;
      color: var(--accent);
      letter-spacing: 0.2em;
    }

    nav { display: flex; gap: 32px; align-items: center; }

    .nav-btn {
      font-size: 0.6rem;
      font-weight: 300;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--text-dim);
      cursor: pointer;
      border: none;
      background: none;
      padding: 0;
      font-family: var(--font);
      transition: color 0.25s;
    }
    .nav-btn:hover { color: var(--accent); }

    /* ── DROP ZONE ── */
    #drop-zone {
      margin: 110px 44px 0;
      border: 1px dashed var(--muted);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 18px;
      padding: 100px 40px;
      cursor: pointer;
      transition: border-color 0.3s, background 0.3s;
      min-height: 340px;
    }

    #drop-zone.drag-over {
      border-color: var(--accent);
      background: rgba(200,169,110,0.03);
    }

    #drop-zone.hidden { display: none; }

    .drop-icon {
      width: 38px; height: 38px;
      color: var(--muted);
    }

    .drop-title {
      font-size: 0.68rem;
      font-weight: 300;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      color: var(--text-dim);
    }

    .drop-sub {
      font-size: 0.58rem;
      font-weight: 300;
      letter-spacing: 0.1em;
      color: var(--text-dim);
      opacity: 0.55;
    }

    .drop-btn {
      margin-top: 6px;
      padding: 10px 30px;
      border: 1px solid var(--muted);
      background: none;
      color: var(--text);
      font-family: var(--font);
      font-size: 0.58rem;
      font-weight: 300;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      cursor: pointer;
      transition: border-color 0.25s, color 0.25s;
    }
    .drop-btn:hover { border-color: var(--accent); color: var(--accent); }

    #file-input { display: none; }

    /* ── GALLERY ── */
    #gallery-wrap {
      padding: 100px 44px 100px;
    }
    #gallery-wrap.hidden { display: none; }

    .gallery-meta {
      display: flex;
      align-items: center;
      gap: 20px;
      margin-bottom: 28px;
    }

    .gallery-label {
      font-size: 0.55rem;
      font-weight: 300;
      letter-spacing: 0.35em;
      text-transform: uppercase;
      color: var(--text-dim);
    }

    .gallery-count {
      font-size: 0.55rem;
      font-weight: 300;
      letter-spacing: 0.18em;
      color: var(--text-dim);
      opacity: 0.6;
    }

    .meta-spacer { flex: 1; }

    .add-more {
      font-size: 0.55rem;
      font-weight: 300;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--text-dim);
      background: none;
      border: none;
      cursor: pointer;
      font-family: var(--font);
      transition: color 0.25s;
    }
    .add-more:hover { color: var(--accent); }

    /* masonry */
    .grid { columns: 3; column-gap: 4px; }
    @media (max-width: 860px) { .grid { columns: 2; } }
    @media (max-width: 500px) { .grid { columns: 1; } }

    .grid-item {
      break-inside: avoid;
      margin-bottom: 4px;
      position: relative;
      overflow: hidden;
      cursor: pointer;
      background: var(--surface);
      opacity: 0;
      transform: translateY(12px);
      transition: opacity 0.55s var(--ease), transform 0.55s var(--ease);
    }

    .grid-item.visible { opacity: 1; transform: translateY(0); }

    .grid-item img {
      display: block;
      width: 100%;
      height: auto;
      transition: transform 0.65s var(--ease), filter 0.35s;
      filter: brightness(0.88) saturate(0.88);
    }

    .grid-item:hover img {
      transform: scale(1.03);
      filter: brightness(1) saturate(1);
    }

    .grid-overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(to top, rgba(5,5,5,0.68) 0%, transparent 46%);
      opacity: 0;
      transition: opacity 0.3s;
      display: flex;
      align-items: flex-end;
      padding: 14px 16px;
    }
    .grid-item:hover .grid-overlay { opacity: 1; }

    .grid-overlay span {
      font-size: 0.65rem;
      font-weight: 300;
      letter-spacing: 0.05em;
      color: var(--white);
    }

    .remove-btn {
      position: absolute;
      top: 9px; right: 9px;
      width: 26px; height: 26px;
      background: rgba(10,10,10,0.8);
      border: 1px solid var(--muted);
      border-radius: 50%;
      color: var(--text-dim);
      font-size: 0.6rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      transition: opacity 0.25s, color 0.25s, border-color 0.25s;
      z-index: 10;
      font-family: var(--font);
    }
    .grid-item:hover .remove-btn { opacity: 1; }
    .remove-btn:hover { color: #e05a5a; border-color: #e05a5a; background: rgba(10,10,10,0.95); }

    /* ── LIGHTBOX ── */
    .lightbox {
      position: fixed;
      inset: 0;
      z-index: 1000;
      background: rgba(5,5,5,0.97);
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s var(--ease);
    }
    .lightbox.open { opacity: 1; pointer-events: all; }

    .lb-inner {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
      max-width: min(92vw, 1100px);
    }

    .lb-img {
      max-width: 100%;
      max-height: 82vh;
      object-fit: contain;
      display: block;
      box-shadow: 0 32px 80px rgba(0,0,0,0.7);
      transform: scale(0.97);
      transition: transform 0.35s var(--ease);
    }
    .lightbox.open .lb-img { transform: scale(1); }

    .lb-caption {
      font-size: 0.68rem;
      font-weight: 300;
      letter-spacing: 0.1em;
      color: var(--text-dim);
    }

    .lb-counter {
      font-size: 0.5rem;
      font-weight: 300;
      letter-spacing: 0.3em;
      color: var(--text-dim);
      opacity: 0.7;
    }

    .lb-close {
      position: fixed;
      top: 26px; right: 40px;
      background: none;
      border: none;
      color: var(--text-dim);
      font-family: var(--font);
      font-size: 0.58rem;
      font-weight: 300;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      cursor: pointer;
      transition: color 0.25s;
    }
    .lb-close:hover { color: var(--white); }

    .lb-nav {
      position: fixed;
      top: 50%; transform: translateY(-50%);
      background: none;
      border: 1px solid var(--muted);
      color: var(--text-dim);
      width: 40px; height: 40px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      font-size: 0.9rem;
      font-family: var(--font);
      transition: border-color 0.25s, color 0.25s;
    }
    .lb-nav:hover { border-color: var(--accent); color: var(--accent); }
    .lb-nav.prev { left: 20px; }
    .lb-nav.next { right: 20px; }

    /* ── FOOTER ── */
    footer {
      border-top: 1px solid var(--border);
      padding: 30px 44px;
    }

    .footer-text {
      font-size: 0.5rem;
      font-weight: 300;
      letter-spacing: 0.32em;
      color: var(--text-dim);
      text-transform: uppercase;
    }

    /* scrollbar */
    ::-webkit-scrollbar { width: 3px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: var(--muted); }
    ::-webkit-scrollbar-thumb:hover { background: var(--accent); }

    @media (max-width: 580px) {
      header { padding: 20px 20px; }
      #drop-zone { margin: 88px 20px 0; padding: 70px 24px; }
      #gallery-wrap { padding: 88px 20px 80px; }
      footer { padding: 28px 20px; }
      .lb-nav.prev { left: 6px; }
      .lb-nav.next { right: 6px; }
    }
  </style>
</head>
<body>

<!-- HEADER -->
<header>
  <div class="logo">Makin <b>Photography</b></div>
  <nav>
    <button class="nav-btn" id="nav-upload-btn">+ Add photos</button>
  </nav>
</header>

<input type="file" id="file-input" accept="image/*" multiple />

<!-- EMPTY STATE / DROP ZONE -->
<div id="drop-zone">
  <svg class="drop-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1" stroke-linecap="round" stroke-linejoin="round">
    <rect x="3" y="3" width="18" height="18" rx="1"/>
    <circle cx="8.5" cy="8.5" r="1.5"/>
    <polyline points="21 15 16 10 5 21"/>
  </svg>
  <p class="drop-title">Drop photos here</p>
  <p class="drop-sub">JPG · PNG · WEBP · any size</p>
  <button class="drop-btn" id="drop-btn">Select files</button>
</div>

<!-- GALLERY -->
<div id="gallery-wrap" class="hidden">
  <div class="gallery-meta">
    <span class="gallery-label">Portfolio</span>
    <span class="gallery-count" id="count-label"></span>
    <div class="meta-spacer"></div>
    <button class="add-more" id="add-more-btn">+ Add more</button>
  </div>
  <div class="grid" id="grid"></div>
</div>

<!-- FOOTER -->
<footer>
  <span class="footer-text">© Makin Photography</span>
</footer>

<!-- LIGHTBOX -->
<div class="lightbox" id="lightbox">
  <button class="lb-close" id="lb-close">✕ &nbsp;Close</button>
  <button class="lb-nav prev" id="lb-prev">&#8592;</button>
  <button class="lb-nav next" id="lb-next">&#8594;</button>
  <div class="lb-inner">
    <img class="lb-img" id="lb-img" src="" alt="" />
    <div class="lb-caption" id="lb-caption"></div>
    <div class="lb-counter" id="lb-counter"></div>
  </div>
</div>

<script>
  let photos  = [];
  let lbIndex = 0;

  const dropZone    = document.getElementById('drop-zone');
  const galleryWrap = document.getElementById('gallery-wrap');
  const grid        = document.getElementById('grid');
  const fileInput   = document.getElementById('file-input');
  const countLabel  = document.getElementById('count-label');
  const lightbox    = document.getElementById('lightbox');
  const lbImg       = document.getElementById('lb-img');
  const lbCaption   = document.getElementById('lb-caption');
  const lbCounter   = document.getElementById('lb-counter');

  // ── FILE INPUT TRIGGERS ────────────────────────────────────────────────────
  document.getElementById('drop-btn').addEventListener('click',      () => fileInput.click());
  document.getElementById('nav-upload-btn').addEventListener('click', () => fileInput.click());
  document.getElementById('add-more-btn').addEventListener('click',   () => fileInput.click());

  fileInput.addEventListener('change', e => { addFiles(e.target.files); fileInput.value = ''; });

  // ── DRAG & DROP ────────────────────────────────────────────────────────────
  dropZone.addEventListener('click', e => {
    if (!e.target.closest('.drop-btn')) fileInput.click();
  });

  ['dragenter','dragover'].forEach(evt => {
    document.body.addEventListener(evt, e => e.preventDefault());
    dropZone.addEventListener(evt, () => dropZone.classList.add('drag-over'));
  });
  dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));

  document.body.addEventListener('drop', e => {
    e.preventDefault();
    dropZone.classList.remove('drag-over');
    if (e.dataTransfer.files.length) addFiles(e.dataTransfer.files);
  });

  // ── ADD FILES ──────────────────────────────────────────────────────────────
  function addFiles(fileList) {
    const imgs = Array.from(fileList).filter(f => f.type.startsWith('image/'));
    if (!imgs.length) return;

    const startIdx = photos.length;

    imgs.forEach(file => {
      photos.push({
        src:  URL.createObjectURL(file),
        name: file.name.replace(/\.[^.]+$/, '').replace(/[-_]/g, ' ')
      });
    });

    updateLayout();
    renderFrom(startIdx);
  }

  // ── LAYOUT ─────────────────────────────────────────────────────────────────
  function updateLayout() {
    const has = photos.length > 0;
    dropZone.classList.toggle('hidden', has);
    galleryWrap.classList.toggle('hidden', !has);
    countLabel.textContent = `${photos.length} photo${photos.length !== 1 ? 's' : ''}`;
  }

  // ── RENDER ─────────────────────────────────────────────────────────────────
  function renderFrom(startIdx) {
    for (let i = startIdx; i < photos.length; i++) {
      const { src, name } = photos[i];
      const item = document.createElement('div');
      item.className   = 'grid-item';
      item.dataset.idx = i;

      item.innerHTML = `
        <img src="${src}" alt="${name}" loading="lazy" />
        <div class="grid-overlay"><span>${name}</span></div>
        <button class="remove-btn" aria-label="Remove photo">✕</button>`;

      item.querySelector('img').addEventListener('click',            () => openLightbox(i));
      item.querySelector('.grid-overlay').addEventListener('click',  () => openLightbox(i));
      item.querySelector('.remove-btn').addEventListener('click', e => {
        e.stopPropagation();
        removePhoto(parseInt(item.dataset.idx));
      });

      grid.appendChild(item);

      const delay = (i % 3) * 65;
      setTimeout(() => requestAnimationFrame(() => item.classList.add('visible')), delay + 20);
    }
  }

  // ── REMOVE ─────────────────────────────────────────────────────────────────
  function removePhoto(idx) {
    URL.revokeObjectURL(photos[idx].src);
    photos.splice(idx, 1);
    grid.innerHTML = '';
    renderFrom(0);
    updateLayout();
    // fix data-idx after re-render
    document.querySelectorAll('.grid-item').forEach((el, i) => el.dataset.idx = i);
  }

  // ── LIGHTBOX ───────────────────────────────────────────────────────────────
  function openLightbox(idx) {
    lbIndex = idx;
    showLbPhoto();
    lightbox.classList.add('open');
    document.body.style.overflow = 'hidden';
  }

  function closeLightbox() {
    lightbox.classList.remove('open');
    document.body.style.overflow = '';
  }

  function showLbPhoto() {
    const p = photos[lbIndex];
    lbImg.src = p.src;
    lbImg.alt = p.name;
    lbCaption.textContent = p.name;
    lbCounter.textContent = `${lbIndex + 1} / ${photos.length}`;
  }

  document.getElementById('lb-close').addEventListener('click', closeLightbox);
  document.getElementById('lb-prev').addEventListener('click', () => { lbIndex = (lbIndex - 1 + photos.length) % photos.length; showLbPhoto(); });
  document.getElementById('lb-next').addEventListener('click', () => { lbIndex = (lbIndex + 1) % photos.length; showLbPhoto(); });

  lightbox.addEventListener('click', e => { if (e.target === lightbox) closeLightbox(); });

  document.addEventListener('keydown', e => {
    if (!lightbox.classList.contains('open')) return;
    if (e.key === 'Escape')      closeLightbox();
    if (e.key === 'ArrowLeft')  { lbIndex = (lbIndex - 1 + photos.length) % photos.length; showLbPhoto(); }
    if (e.key === 'ArrowRight') { lbIndex = (lbIndex + 1) % photos.length; showLbPhoto(); }
  });
</script>
</body>
</html>
