<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Makin Photography</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Josefin+Sans:wght@100;300&display=swap" rel="stylesheet" />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0a0a0a;
      --surface:   #111111;
      --border:    #1e1e1e;
      --muted:     #3a3a3a;
      --text:      #c8c0b4;
      --text-dim:  #5a5550;
      --accent:    #c8a96e;
      --white:     #e8e2d9;
      --font-disp: 'Cormorant Garamond', Georgia, serif;
      --font-ui:   'Josefin Sans', sans-serif;
      --ease:      cubic-bezier(0.25, 0.46, 0.45, 0.94);
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-disp);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ── NOISE OVERLAY ── */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='1'/%3E%3C/svg%3E");
      opacity: 0.025;
      pointer-events: none;
      z-index: 9999;
    }

    /* ── HEADER ── */
    header {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 100;
      padding: 28px 48px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: linear-gradient(to bottom, rgba(10,10,10,0.98) 60%, transparent);
    }

    .logo {
      font-family: var(--font-disp);
      font-weight: 300;
      font-size: 1.05rem;
      letter-spacing: 0.18em;
      color: var(--white);
      text-transform: uppercase;
    }

    .logo span {
      color: var(--accent);
      font-style: italic;
      font-weight: 400;
      letter-spacing: 0;
      text-transform: none;
    }

    nav {
      display: flex;
      gap: 36px;
    }

    nav a {
      font-family: var(--font-ui);
      font-size: 0.65rem;
      font-weight: 100;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--text-dim);
      text-decoration: none;
      transition: color 0.3s var(--ease);
    }

    nav a:hover { color: var(--accent); }

    /* ── HERO ── */
    .hero {
      padding: 180px 48px 80px;
      max-width: 680px;
    }

    .hero-eyebrow {
      font-family: var(--font-ui);
      font-size: 0.6rem;
      font-weight: 300;
      letter-spacing: 0.4em;
      color: var(--accent);
      text-transform: uppercase;
      margin-bottom: 28px;
      opacity: 0;
      animation: fadeUp 1s var(--ease) 0.2s forwards;
    }

    .hero h1 {
      font-family: var(--font-disp);
      font-weight: 300;
      font-size: clamp(2.8rem, 6vw, 5rem);
      line-height: 1.08;
      color: var(--white);
      letter-spacing: -0.01em;
      opacity: 0;
      animation: fadeUp 1s var(--ease) 0.4s forwards;
    }

    .hero h1 em {
      font-style: italic;
      color: var(--accent);
    }

    .hero-sub {
      margin-top: 24px;
      font-family: var(--font-disp);
      font-size: 1rem;
      font-weight: 300;
      color: var(--text-dim);
      letter-spacing: 0.04em;
      line-height: 1.7;
      opacity: 0;
      animation: fadeUp 1s var(--ease) 0.6s forwards;
    }

    /* ── DIVIDER ── */
    .divider {
      margin: 0 48px;
      border: none;
      border-top: 1px solid var(--border);
    }

    /* ── GALLERY SECTION ── */
    .gallery-section {
      padding: 60px 48px 120px;
    }

    .section-label {
      font-family: var(--font-ui);
      font-size: 0.58rem;
      font-weight: 300;
      letter-spacing: 0.35em;
      text-transform: uppercase;
      color: var(--text-dim);
      margin-bottom: 40px;
      display: flex;
      align-items: center;
      gap: 20px;
    }

    .section-label::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    /* ── LOADING STATE ── */
    .loading {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 80px 0;
      gap: 20px;
      color: var(--text-dim);
      font-family: var(--font-ui);
      font-size: 0.6rem;
      font-weight: 100;
      letter-spacing: 0.3em;
      text-transform: uppercase;
    }

    .loading-ring {
      width: 32px;
      height: 32px;
      border: 1px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 1.2s linear infinite;
    }

    .error-msg {
      text-align: center;
      padding: 60px;
      font-family: var(--font-disp);
      font-size: 1.1rem;
      color: var(--text-dim);
      font-style: italic;
    }

    .error-msg a {
      color: var(--accent);
      text-decoration: underline;
    }

    /* ── MASONRY GRID ── */
    .grid {
      columns: 3;
      column-gap: 3px;
    }

    @media (max-width: 900px) { .grid { columns: 2; } }
    @media (max-width: 560px) { .grid { columns: 1; } }

    .grid-item {
      break-inside: avoid;
      margin-bottom: 3px;
      position: relative;
      overflow: hidden;
      cursor: pointer;
      background: var(--surface);
      opacity: 0;
      transform: translateY(16px);
      transition: opacity 0.6s var(--ease), transform 0.6s var(--ease);
    }

    .grid-item.visible {
      opacity: 1;
      transform: translateY(0);
    }

    .grid-item img {
      display: block;
      width: 100%;
      height: auto;
      transition: transform 0.7s var(--ease), filter 0.4s var(--ease);
      filter: brightness(0.88) saturate(0.9);
    }

    .grid-item:hover img {
      transform: scale(1.04);
      filter: brightness(1) saturate(1);
    }

    .grid-item .overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(to top, rgba(5,5,5,0.75) 0%, transparent 50%);
      opacity: 0;
      transition: opacity 0.4s var(--ease);
      display: flex;
      align-items: flex-end;
      padding: 20px;
    }

    .grid-item:hover .overlay { opacity: 1; }

    .photo-title {
      font-family: var(--font-disp);
      font-weight: 300;
      font-style: italic;
      font-size: 0.9rem;
      color: var(--white);
      letter-spacing: 0.03em;
      line-height: 1.3;
    }

    /* ── LIGHTBOX ── */
    .lightbox {
      position: fixed;
      inset: 0;
      z-index: 1000;
      background: rgba(5, 5, 5, 0.97);
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.35s var(--ease);
    }

    .lightbox.open {
      opacity: 1;
      pointer-events: all;
    }

    .lightbox-inner {
      position: relative;
      max-width: min(90vw, 1100px);
      max-height: 90vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 18px;
    }

    .lightbox-img {
      max-width: 100%;
      max-height: 80vh;
      object-fit: contain;
      display: block;
      box-shadow: 0 40px 100px rgba(0,0,0,0.8);
      transform: scale(0.96);
      transition: transform 0.4s var(--ease);
    }

    .lightbox.open .lightbox-img { transform: scale(1); }

    .lightbox-caption {
      font-family: var(--font-disp);
      font-style: italic;
      font-size: 0.95rem;
      color: var(--text-dim);
      letter-spacing: 0.05em;
    }

    .lightbox-close {
      position: fixed;
      top: 28px; right: 36px;
      background: none;
      border: none;
      color: var(--text-dim);
      font-family: var(--font-ui);
      font-size: 0.6rem;
      font-weight: 100;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      cursor: pointer;
      transition: color 0.3s;
      padding: 8px;
    }

    .lightbox-close:hover { color: var(--white); }

    .lightbox-nav {
      position: fixed;
      top: 50%; transform: translateY(-50%);
      background: none;
      border: 1px solid var(--muted);
      color: var(--text-dim);
      width: 44px; height: 44px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: border-color 0.3s, color 0.3s;
    }

    .lightbox-nav:hover { border-color: var(--accent); color: var(--accent); }
    .lightbox-nav.prev { left: 24px; }
    .lightbox-nav.next { right: 24px; }

    .lightbox-counter {
      font-family: var(--font-ui);
      font-size: 0.55rem;
      font-weight: 100;
      letter-spacing: 0.3em;
      color: var(--text-dim);
    }

    /* ── FOOTER ── */
    footer {
      border-top: 1px solid var(--border);
      padding: 40px 48px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .footer-text {
      font-family: var(--font-ui);
      font-size: 0.55rem;
      font-weight: 100;
      letter-spacing: 0.3em;
      color: var(--text-dim);
      text-transform: uppercase;
    }

    .footer-link {
      font-family: var(--font-ui);
      font-size: 0.55rem;
      font-weight: 100;
      letter-spacing: 0.25em;
      color: var(--text-dim);
      text-transform: uppercase;
      text-decoration: none;
      border-bottom: 1px solid transparent;
      transition: color 0.3s, border-color 0.3s;
    }

    .footer-link:hover { color: var(--accent); border-color: var(--accent); }

    /* ── ANIMATIONS ── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* ── SCROLLBAR ── */
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: var(--muted); border-radius: 2px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--accent); }

    @media (max-width: 600px) {
      header { padding: 20px 24px; }
      nav { display: none; }
      .hero { padding: 140px 24px 60px; }
      .divider, .gallery-section { margin-left: 0; margin-right: 0; padding-left: 24px; padding-right: 24px; }
      footer { padding: 32px 24px; flex-direction: column; gap: 16px; }
    }
  </style>
</head>
<body>

  <!-- HEADER -->
  <header>
    <div class="logo">Makin<span>Photography</span></div>
    <nav>
      <a href="#gallery">Portfolio</a>
      <a href="https://www.flickr.com/photos/makinphotography/" target="_blank">Flickr</a>
    </nav>
  </header>

  <!-- HERO -->
  <section class="hero">
    <p class="hero-eyebrow">Portfolio — Selected Works</p>
    <h1>Light<br/>captured<br/><em>in still moments</em></h1>
    <p class="hero-sub">A curated collection exploring the interplay of shadow, texture, and quiet presence.</p>
  </section>

  <hr class="divider" />

  <!-- GALLERY -->
  <section class="gallery-section" id="gallery">
    <div class="section-label">Photographs</div>
    <div id="gallery-container">
      <div class="loading" id="loading">
        <div class="loading-ring"></div>
        Loading album
      </div>
    </div>
  </section>

  <!-- FOOTER -->
  <footer>
    <span class="footer-text">© Makin Photography</span>
    <a href="https://www.flickr.com/photos/makinphotography/albums/72157673996777365" target="_blank" class="footer-link">View on Flickr</a>
  </footer>

  <!-- LIGHTBOX -->
  <div class="lightbox" id="lightbox" role="dialog" aria-modal="true">
    <button class="lightbox-close" id="lb-close">✕ &nbsp;Close</button>
    <button class="lightbox-nav prev" id="lb-prev" aria-label="Previous">&#8592;</button>
    <button class="lightbox-nav next" id="lb-next" aria-label="Next">&#8594;</button>
    <div class="lightbox-inner">
      <img class="lightbox-img" id="lb-img" src="" alt="" />
      <div class="lightbox-caption" id="lb-caption"></div>
      <div class="lightbox-counter" id="lb-counter"></div>
    </div>
  </div>

  <script>
    // ── CONFIG ──────────────────────────────────────────────────────────────
    // Flickr public API key (register free at https://www.flickr.com/services/apps/create/)
    // Replace with your own key for production use.
    const FLICKR_KEY   = 'your_flickr_api_key_here'; // ← replace me
    const PHOTOSET_ID  = '72157673996777365';
    const USER_ID      = 'makinphotography'; // nsid or path_alias

    // ── FLICKR FETCH ─────────────────────────────────────────────────────────
    async function loadFlickrAlbum() {
      const container = document.getElementById('gallery-container');

      // First resolve user NSID from alias if needed
      let userId = USER_ID;
      try {
        const lookupUrl = `https://api.flickr.com/services/rest/?method=flickr.urls.lookupUser&api_key=${FLICKR_KEY}&url=https://www.flickr.com/photos/${USER_ID}/&format=json&nojsoncallback=1`;
        const r = await fetch(lookupUrl);
        const d = await r.json();
        if (d.stat === 'ok') userId = d.user.id;
      } catch(e) { /* fall through with alias */ }

      const url = `https://api.flickr.com/services/rest/?method=flickr.photosets.getPhotos&api_key=${FLICKR_KEY}&photoset_id=${PHOTOSET_ID}&user_id=${userId}&extras=url_m,url_l,url_o,title&format=json&nojsoncallback=1`;

      try {
        const res  = await fetch(url);
        const data = await res.json();

        if (data.stat !== 'ok') throw new Error(data.message || 'Flickr API error');

        const photos = data.photoset.photo;
        renderGallery(photos, container);
      } catch (err) {
        container.innerHTML = `
          <div class="error-msg">
            <p>Unable to load photos automatically.</p>
            <br/>
            <p>To display your Flickr album, add a free API key from
            <a href="https://www.flickr.com/services/apps/create/" target="_blank">flickr.com/services/apps</a>
            and set <code>FLICKR_KEY</code> at the top of this file.</p>
            <br/>
            <p style="font-size:0.85rem;color:var(--text-dim)">Error: ${err.message}</p>
          </div>`;

        // Show demo placeholders so the layout is still beautiful
        renderDemo(container);
      }
    }

    // ── DEMO MODE (no API key) ────────────────────────────────────────────────
    function renderDemo(container) {
      // Use Flickr's public embed-safe URLs for demo (unsplash landscape photos)
      const demoPhotos = [
        { id:'1', url_m:'https://picsum.photos/seed/cam1/800/600',  url_l:'https://picsum.photos/seed/cam1/1600/1200', title:'Morning Light' },
        { id:'2', url_m:'https://picsum.photos/seed/cam2/600/900',  url_l:'https://picsum.photos/seed/cam2/1200/1800', title:'Still Water' },
        { id:'3', url_m:'https://picsum.photos/seed/cam3/900/600',  url_l:'https://picsum.photos/seed/cam3/1800/1200', title:'Golden Hour' },
        { id:'4', url_m:'https://picsum.photos/seed/cam4/700/1050', url_l:'https://picsum.photos/seed/cam4/1400/2100', title:'Dusk Portrait' },
        { id:'5', url_m:'https://picsum.photos/seed/cam5/850/600',  url_l:'https://picsum.photos/seed/cam5/1700/1200', title:'Long Exposure' },
        { id:'6', url_m:'https://picsum.photos/seed/cam6/600/800',  url_l:'https://picsum.photos/seed/cam6/1200/1600', title:'Texture Study' },
        { id:'7', url_m:'https://picsum.photos/seed/cam7/1000/650', url_l:'https://picsum.photos/seed/cam7/2000/1300', title:'Empty Street' },
        { id:'8', url_m:'https://picsum.photos/seed/cam8/620/900',  url_l:'https://picsum.photos/seed/cam8/1240/1800', title:'Soft Focus' },
        { id:'9', url_m:'https://picsum.photos/seed/cam9/900/700',  url_l:'https://picsum.photos/seed/cam9/1800/1400', title:'Urban Geometry' },
      ];
      renderGallery(demoPhotos, container);
    }

    // ── RENDER GRID ───────────────────────────────────────────────────────────
    let allPhotos = [];
    let currentIdx = 0;

    function renderGallery(photos, container) {
      allPhotos = photos;
      document.getElementById('loading')?.remove();

      const grid = document.createElement('div');
      grid.className = 'grid';

      photos.forEach((photo, i) => {
        const item = document.createElement('div');
        item.className = 'grid-item';
        item.dataset.index = i;

        const imgSrc = photo.url_m || `https://live.staticflickr.com/${photo.server}/${photo.id}_${photo.secret}_m.jpg`;
        const title  = photo.title || '';

        item.innerHTML = `
          <img src="${imgSrc}" alt="${title}" loading="lazy" />
          <div class="overlay">
            <span class="photo-title">${title}</span>
          </div>`;

        item.addEventListener('click', () => openLightbox(i));
        grid.appendChild(item);
      });

      container.appendChild(grid);
      observeItems();
    }

    // ── INTERSECTION OBSERVER (stagger reveal) ────────────────────────────────
    function observeItems() {
      const observer = new IntersectionObserver((entries) => {
        entries.forEach((entry, idx) => {
          if (entry.isIntersecting) {
            // stagger per-column
            const el = entry.target;
            const delay = (parseInt(el.dataset.index) % 3) * 80;
            setTimeout(() => el.classList.add('visible'), delay);
            observer.unobserve(el);
          }
        });
      }, { threshold: 0.08 });

      document.querySelectorAll('.grid-item').forEach(el => observer.observe(el));
    }

    // ── LIGHTBOX ─────────────────────────────────────────────────────────────
    const lightbox   = document.getElementById('lightbox');
    const lbImg      = document.getElementById('lb-img');
    const lbCaption  = document.getElementById('lb-caption');
    const lbCounter  = document.getElementById('lb-counter');

    function openLightbox(idx) {
      currentIdx = idx;
      showPhoto();
      lightbox.classList.add('open');
      document.body.style.overflow = 'hidden';
    }

    function closeLightbox() {
      lightbox.classList.remove('open');
      document.body.style.overflow = '';
    }

    function showPhoto() {
      const photo = allPhotos[currentIdx];
      const src   = photo.url_l || photo.url_m || `https://live.staticflickr.com/${photo.server}/${photo.id}_${photo.secret}_b.jpg`;
      lbImg.src     = src;
      lbImg.alt     = photo.title || '';
      lbCaption.textContent = photo.title || '';
      lbCounter.textContent = `${currentIdx + 1} / ${allPhotos.length}`;
    }

    document.getElementById('lb-close').addEventListener('click', closeLightbox);
    document.getElementById('lb-prev').addEventListener('click', () => {
      currentIdx = (currentIdx - 1 + allPhotos.length) % allPhotos.length;
      showPhoto();
    });
    document.getElementById('lb-next').addEventListener('click', () => {
      currentIdx = (currentIdx + 1) % allPhotos.length;
      showPhoto();
    });

    lightbox.addEventListener('click', (e) => {
      if (e.target === lightbox) closeLightbox();
    });

    document.addEventListener('keydown', (e) => {
      if (!lightbox.classList.contains('open')) return;
      if (e.key === 'Escape')      closeLightbox();
      if (e.key === 'ArrowLeft')  { currentIdx = (currentIdx - 1 + allPhotos.length) % allPhotos.length; showPhoto(); }
      if (e.key === 'ArrowRight') { currentIdx = (currentIdx + 1) % allPhotos.length; showPhoto(); }
    });

    // ── INIT ─────────────────────────────────────────────────────────────────
    loadFlickrAlbum();
  </script>
</body>
</html>
