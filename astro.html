<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Astrophotography — Sean Makin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,200;9..40,300;9..40,400&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0a0a0a;
      --surface:   #111111;
      --border:    #252525;
      --muted:     #444444;
      --text:      #c8c8c8;
      --text-dim:  #888888;
      --font:      'DM Sans', sans-serif;
      --ease:      cubic-bezier(0.25, 0.46, 0.45, 0.94);
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      min-height: 100vh;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='1'/%3E%3C/svg%3E");
      opacity: 0.025;
      pointer-events: none;
      z-index: 9999;
    }

    /* ── HEADER ── */
    header {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 200;
      padding: 26px 10%;
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: linear-gradient(to bottom, rgba(10,10,10,0.97) 55%, transparent);
    }

    
    .logo {
      font-weight: 200; font-size: 1rem; letter-spacing: 0.28em; text-transform: uppercase;
      text-decoration: none; color: var(--text);
    }
    .logo b { font-weight: 400; letter-spacing: 0.2em; }

    nav { display: flex; gap: 32px; align-items: center; }
    nav a {
      font-size: 0.8rem; font-weight: 300; letter-spacing: 0.18em;
      text-transform: uppercase; color: var(--text-dim);
      text-decoration: none; transition: color 0.25s;
    }
    nav a:hover { color: var(--text); }
    nav a.active { color: var(--text); }

    .nav-icon { display: flex; align-items: center; color: var(--text-dim); transition: color 0.25s; }
    .nav-icon:hover { color: var(--text); }

    /* ── GALLERY WRAPPER ── */
    #gallery-wrap {
      padding: 120px 0 100px;
      width: 80%;
      margin: 0 auto;
    }

    .gallery-meta { padding-bottom: 28px; }
    .gallery-label {
      font-size: 0.75rem; font-weight: 300; letter-spacing: 0.3em;
      text-transform: uppercase; color: var(--text-dim);
    }

    /* ── MASONRY ── */
    .grid {
      column-count: 2;
      column-gap: 12px;
    }

    .grid-item {
      display: block;
      position: relative;
      padding-bottom: 12px; /* Gap between stacked images */
      break-inside: avoid; /* Prevents images from splitting across columns */
      cursor: pointer;
      background: var(--surface);
      opacity: 0;
      transform: translateY(15px);
      transition: opacity 0.6s var(--ease), transform 0.6s var(--ease);
    }

    .grid-item.visible { opacity: 1; transform: translateY(0); }

    .grid-item img {
      display: block;
      width: 100%;
      height: auto;
      filter: brightness(0.9);
      transition: transform 0.6s var(--ease), filter 0.4s;
    }
    .grid-item:hover img { transform: scale(1.0); filter: brightness(1); }

    .grid-overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(to top, rgba(5,5,5,0.5) 0%, transparent 40%);
      opacity: 0;
      transition: opacity 0.3s;
      display: flex;
      align-items: flex-end;
      padding: 18px;
    }
    .grid-item:hover .grid-overlay { opacity: 1; }
    .grid-overlay span { font-size: 0.8rem; font-weight: 300; color: var(--text); }

    @media (max-width: 1100px) { .grid { column-count: 2; } }
    @media (max-width: 600px) { 
      .grid { column-count: 1; }
      #gallery-wrap { width: 90%; }
    }

    /* ── EMPTY STATE ── */
    #empty-state {
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      padding: 100px 40px;
      text-align: center;
    }
    #empty-state.show { display: flex; }

    .empty-icon { width: 36px; height: 36px; color: var(--muted); }
    .empty-title {
      font-size: 0.85rem; font-weight: 300; letter-spacing: 0.28em;
      text-transform: uppercase; color: var(--text-dim);
    }
    .empty-sub {
      font-size: 0.78rem; font-weight: 300; letter-spacing: 0.06em;
      color: var(--text-dim); opacity: 0.7;
      max-width: 360px; line-height: 1.8;
    }
    .empty-sub code {
      font-family: 'Courier New', monospace;
      background: var(--surface); border: 1px solid var(--border);
      padding: 1px 6px; border-radius: 2px; color: var(--text); font-size: 0.9em;
    }

    /* ── LIGHTBOX ── */
    .lightbox {
      position: fixed; inset: 0; z-index: 1000;
      background: rgba(5,5,5,0.98);
      display: flex; align-items: center; justify-content: center;
      opacity: 0; pointer-events: none;
      transition: opacity 0.3s var(--ease);
    }
    .lightbox.open { opacity: 1; pointer-events: all; }

    .lb-inner {
      display: flex; flex-direction: column; align-items: center;
      gap: 14px; width: 95%;
    }
    .lb-img {
      max-width: 100%; max-height: 85vh;
      object-fit: contain;
      box-shadow: 0 30px 60px rgba(0,0,0,0.5);
    }

    .lb-caption { font-size: 0.9rem; font-weight: 300; letter-spacing: 0.1em; color: var(--text-dim); }
    .lb-counter { font-size: 0.7rem; letter-spacing: 0.2em; color: var(--text-dim); opacity: 0.6; }

    .lb-close {
      position: fixed; top: 25px; right: 30px;
      background: none; border: none; color: var(--text-dim);
      font-family: var(--font); font-size: 0.8rem; letter-spacing: 0.2em;
      text-transform: uppercase; cursor: pointer; transition: color 0.25s;
    }
    .lb-close:hover { color: var(--text); }

    .lb-nav {
      position: fixed; top: 50%; transform: translateY(-50%);
      background: none; border: 1px solid var(--border);
      color: var(--text-dim); width: 40px; height: 40px;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      transition: border-color 0.25s, color 0.25s;
    }
    .lb-nav:hover { border-color: var(--muted); color: var(--text); }
    .lb-nav.prev { left: 20px; }
    .lb-nav.next { right: 20px; }

    /* ── FOOTER ── */
    footer { border-top: 1px solid var(--border); padding: 30px 0; width: 80%; margin: 0 auto; }
    .footer-text { font-size: 0.7rem; letter-spacing: 0.2em; color: var(--text-dim); text-transform: uppercase; }

    ::-webkit-scrollbar { width: 3px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: var(--muted); }
    ::-webkit-scrollbar-thumb:hover { background: var(--text-dim); }
  </style>
</head>
<body>

<header>
  <a class="logo" href="index.html">Sean <b>Makin</b></a>
  <nav>
    <a href="index.html">Portfolio</a>
    <a href="astro.html" class="active">Astrophotography</a>
    <a href="mailto:you@email.com">Contact</a>
    <a href="https://www.flickr.com/photos/makinphotography/" target="_blank" rel="noopener" class="nav-icon" aria-label="Flickr">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><circle cx="7" cy="12" r="4.5"/><circle cx="17" cy="12" r="4.5"/></svg>
    </a>
    <a href="https://www.instagram.com/sean.makin/" target="_blank" rel="noopener" class="nav-icon" aria-label="Instagram">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="2" width="20" height="20" rx="5"/><circle cx="12" cy="12" r="4"/><circle cx="17.5" cy="6.5" r="0.75" fill="currentColor" stroke="none"/></svg>
    </a>
  </nav>
</header>

<div id="gallery-wrap">
  <div class="gallery-meta"><span class="gallery-label">Astrophotography</span></div>
  <div id="empty-state">
    <svg class="empty-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="12" cy="12" r="3"/>
      <path d="M12 2v2M12 20v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M2 12h2M20 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/>
    </svg>
    <p class="empty-title">No photos yet</p>
    <p class="empty-sub">Add astro images to the <code>images/</code> folder and list them in the <code>PHOTOS</code> array in <code>astro.html</code>.</p>
  </div>
  <div class="grid" id="grid"></div>
</div>

<footer>
  <span class="footer-text">© Sean Makin</span>
</footer>

<div class="lightbox" id="lightbox">
  <button class="lb-close" id="lb-close">✕ &nbsp;Close</button>
  <button class="lb-nav prev" id="lb-prev">&#8592;</button>
  <button class="lb-nav next" id="lb-next">&#8594;</button>
  <div class="lb-inner">
    <img class="lb-img" id="lb-img" src="" alt="" />
    <div class="lb-caption" id="lb-caption"></div>
    <div class="lb-counter" id="lb-counter"></div>
  </div>
</div>

<script>
  // ============================================================
  //  Add your astrophotography images here.
  //  Files go in the same images/ folder as your main portfolio.
  //
  //  { file: "milkyway.jpg", title: "Milky Way Core" },
  // ============================================================
  const PHOTOS = [
  { file: "Gab Mis LRGB.jpg", title: "Gabriella Mistral Nebula" },
  { file: "Seagull HaLRGB.jpg", title: "Seagull Nebula" }
  ];

  const IMAGE_DIR = "images/";
  const grid      = document.getElementById('grid');
  const emptyState = document.getElementById('empty-state');

  if (PHOTOS.length === 0) {
    emptyState.classList.add('show');
  } else {
    PHOTOS.forEach(({ file, title }, i) => {
      const item = document.createElement('div');
      item.className = 'grid-item';
      const src = IMAGE_DIR + encodeURIComponent(file);

      item.innerHTML = `
        <img src="${src}" alt="${title}" loading="lazy" />
        <div class="grid-overlay"><span>${title}</span></div>`;

      item.addEventListener('click', () => openLightbox(i));
      grid.appendChild(item);

      setTimeout(() => {
        requestAnimationFrame(() => item.classList.add('visible'));
      }, (i % 3) * 80 + 50);
    });
  }

  let lbIndex = 0;
  const lightbox  = document.getElementById('lightbox');
  const lbImg     = document.getElementById('lb-img');
  const lbCaption = document.getElementById('lb-caption');
  const lbCounter = document.getElementById('lb-counter');

  function openLightbox(idx) {
    lbIndex = idx;
    showPhoto();
    lightbox.classList.add('open');
    document.body.style.overflow = 'hidden';
  }

  function closeLightbox() {
    lightbox.classList.remove('open');
    document.body.style.overflow = '';
  }

  function showPhoto() {
    const { file, title } = PHOTOS[lbIndex];
    lbImg.src = IMAGE_DIR + encodeURIComponent(file);
    lbCaption.textContent = title;
    lbCounter.textContent = `${lbIndex + 1} / ${PHOTOS.length}`;
  }

  document.getElementById('lb-close').addEventListener('click', closeLightbox);
  document.getElementById('lb-prev').addEventListener('click', () => { lbIndex = (lbIndex - 1 + PHOTOS.length) % PHOTOS.length; showPhoto(); });
  document.getElementById('lb-next').addEventListener('click', () => { lbIndex = (lbIndex + 1) % PHOTOS.length; showPhoto(); });
  lightbox.addEventListener('click', e => { if (e.target === lightbox) closeLightbox(); });

  document.addEventListener('keydown', e => {
    if (!lightbox.classList.contains('open')) return;
    if (e.key === 'Escape')      closeLightbox();
    if (e.key === 'ArrowLeft')  { lbIndex = (lbIndex - 1 + PHOTOS.length) % PHOTOS.length; showPhoto(); }
    if (e.key === 'ArrowRight') { lbIndex = (lbIndex + 1) % PHOTOS.length; showPhoto(); }
  });
</script>
</body>
</html>
